services:

  ########################################################################################
  ########################################################################################
  db:
    image: pgvector/pgvector:pg17
    container_name: db
    env_file: .env
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  ########################################################################################
  ########################################################################################
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  ########################################################################################
  ########################################################################################
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 10

  ########################################################################################
  ########################################################################################
  model-init:
    image: ollama/ollama:latest
    container_name: model-init
    tty: true
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: /bin/sh
    command: 
      - "-c"
      - |
        echo "Pulling Qwen2.5 1.5B (approx 1.1GB)..."
        ollama pull qwen2.5:1.5b
        echo "Models downloaded successfully."
    depends_on:
      ollama:
        condition: service_healthy

  ########################################################################################
  ########################################################################################
  api:
    build: .
    container_name: api
    command: python -m app.main
    env_file: .env
    ports:
      - 8000:8000
    volumes:
      - .:/code
    depends_on:
      db:
        condition: service_started
      ollama:
        condition: service_healthy
      redis:
        condition: service_started

  ########################################################################################
  ########################################################################################
  worker:
    build: .
    container_name: worker
    command: taskiq worker app.taskiq.main:broker # --reload --reload-dir app --log-level DEBUG
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_HOST=http://ollama:11434
      - PYTHONDONTWRITEBYTECODE=1
      - WATCHFILES_FORCE_POLLING=1 
    volumes:
      - .:/code
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started

  ########################################################################################
  ########################################################################################
  scheduler:
    build: .
    container_name: scheduler
    command: taskiq scheduler app.taskiq.main:scheduler
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/code
    depends_on:
      redis:
        condition: service_started

  ########################################################################################
  ########################################################################################
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      ollama:
        condition: service_healthy

  ########################################################################################
  ########################################################################################
  # redis-insight:
  #   image: redis/redisinsight:latest
  #   container_name: redis-insight
  #   restart: always
  #   ports:
  #     - "5541:5540"
  #   volumes:
  #     - redis_insight_data:/data
  #   depends_on:
  #     - redis

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  open_webui_data:
  # redis_insight_data: